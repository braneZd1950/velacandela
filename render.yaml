# Render Blueprint — statička Vite/React stranica
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: velacandela
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
